<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">树莓派小型气象站源码推导接线边界图</title>
  <desc id="desc">Raspberry Pi 以 GPIO4 连接 DHT22 数据线，以 I2C GPIO2 和 GPIO3 连接 BH1750。图中明确提示这是未复测的接线边界而非原理图或 PCB。</desc>
  <style>
    .bg { fill: #fffaf5; }
    .card { fill: #ffffff; stroke: #9a5a24; stroke-width: 3; rx: 20; }
    .text { fill: #2d1b0e; font-family: "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; }
    .muted { fill: #76543a; font-family: "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; }
    .wire { fill: none; stroke: #d86516; stroke-width: 5; stroke-linecap: round; }
    .power { fill: none; stroke: #2e8b57; stroke-width: 5; stroke-linecap: round; }
    .ground { fill: none; stroke: #596b7a; stroke-width: 5; stroke-linecap: round; }
  </style>
  <rect class="bg" width="1200" height="620" rx="28"/>
  <text class="text" x="60" y="76" font-size="34" font-weight="700">基于树莓派的多传感器小型气象站</text>
  <text class="muted" x="60" y="116" font-size="20">源码与现有文档推导的接线边界 · 非原理图 / 非 PCB / 当前公开提交未真机复测</text>
  <rect class="card" x="430" y="190" width="340" height="250"/>
  <text class="text" x="600" y="250" font-size="30" font-weight="700" text-anchor="middle">Raspberry Pi</text>
  <text class="muted" x="600" y="294" font-size="20" text-anchor="middle">3.3 V GPIO only</text>
  <text class="text" x="470" y="346" font-size="20">GPIO4 / Pin 7 · DHT22 DATA</text>
  <text class="text" x="470" y="382" font-size="20">GPIO2 / Pin 3 · I²C SDA</text>
  <text class="text" x="470" y="418" font-size="20">GPIO3 / Pin 5 · I²C SCL</text>
  <rect class="card" x="72" y="220" width="260" height="180"/>
  <text class="text" x="202" y="270" font-size="27" font-weight="700" text-anchor="middle">DHT22</text>
  <text class="muted" x="202" y="309" font-size="18" text-anchor="middle">温度 / 湿度</text>
  <text class="muted" x="202" y="345" font-size="17" text-anchor="middle">DATA 上拉待实物确认</text>
  <rect class="card" x="870" y="220" width="260" height="180"/>
  <text class="text" x="1000" y="270" font-size="27" font-weight="700" text-anchor="middle">BH1750</text>
  <text class="muted" x="1000" y="309" font-size="18" text-anchor="middle">光照（I²C）</text>
  <text class="muted" x="1000" y="345" font-size="17" text-anchor="middle">地址 0x23 / 0x5C 待确认</text>
  <path class="wire" d="M332 292H430"/><text class="muted" x="352" y="280" font-size="16">GPIO4</text>
  <path class="power" d="M332 330H430"/><text class="muted" x="352" y="319" font-size="16">3.3 V</text>
  <path class="ground" d="M332 368H430"/><text class="muted" x="352" y="389" font-size="16">GND</text>
  <path class="wire" d="M770 300H870"/><text class="muted" x="793" y="286" font-size="16">SDA GPIO2</text>
  <path class="wire" d="M770 338H870"/><text class="muted" x="793" y="361" font-size="16">SCL GPIO3</text>
  <path class="power" d="M770 376H870"/><text class="muted" x="793" y="365" font-size="16">3.3 V</text>
  <path class="ground" d="M770 414H870"/><text class="muted" x="793" y="437" font-size="16">GND</text>
  <text class="text" x="60" y="544" font-size="18" font-weight="700">上电前核对：模块电压、电平、DHT22 上拉、BH1750 I²C 地址、供电能力与所有公共地。</text>
  <text class="muted" x="60" y="580" font-size="17">不要把 5 V 信号直接接入 Raspberry Pi GPIO；真实接线和传感器行为须按当前 commit 重新复测。</text>
</svg>
