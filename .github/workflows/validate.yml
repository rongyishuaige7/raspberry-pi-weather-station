name: Validate Raspberry Pi Weather Station

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: raspberry-pi-weather-station-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  source-and-build:
    name: Source contracts and builds
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: test_root_password_for_ephemeral_ci_only
          MYSQL_DATABASE: weather_station
          MYSQL_USER: test_weather_user
          MYSQL_PASSWORD: test_database_password_for_ephemeral_ci_only
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -ptest_root_password_for_ephemeral_ci_only"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12
    env:
      MYSQL_HOST: 127.0.0.1
      MYSQL_PORT: "3306"
      MYSQL_USER: test_weather_user
      MYSQL_PASSWORD: test_database_password_for_ephemeral_ci_only
      MYSQL_ROOT_PASSWORD: test_root_password_for_ephemeral_ci_only
      MYSQL_DATABASE: weather_station
      JWT_SECRET: test_jwt_secret_for_ephemeral_ci_only_2026_minimum_length
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Set up .NET
        uses: actions/setup-dotnet@d4c94342e560b34958e8e6c1692324faeaa6cf3c # v5.0.0
        with:
          dotnet-version: "8.0.x"

      - name: Install Python dependencies
        run: python3 -m pip install --disable-pip-version-check -r raspi/requirements.txt

      - name: Run publication and source-contract gates
        run: |
          python3 scripts/secret_scan.py
          python3 scripts/check_repo.py
          python3 -m compileall -q raspi tests
          python3 -m unittest discover -s tests -p 'test_source_contracts.py' -v

      - name: Verify isolated MySQL, mock collector, and Flask API
        run: bash scripts/run_mysql_integration.sh

      - name: Build Avalonia desktop client
        run: |
          dotnet restore upper/WeatherStation.sln --locked-mode
          dotnet build upper/WeatherStation.sln --configuration Release --no-restore

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out full history
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Scan repository history
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: "false"
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"
